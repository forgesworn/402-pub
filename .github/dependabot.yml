version: 2
updates:
  # npm devDependencies — 402-pub has zero runtime dependencies,
  # so every npm bump here is a dev-only change. Group them into
  # a single weekly PR to keep noise low.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: development
    commit-message:
      prefix: chore
      include: scope
